<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial Detallado | LabAsset 360</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 p-10">
    <div class="max-w-5xl mx-auto">
        <div class="flex items-center gap-4 mb-8">
            <a href="index.html" class="bg-white p-2 rounded-lg shadow hover:bg-slate-100 transition-all">
                <i data-lucide="arrow-left"></i>
            </a>
            <h1 id="nombre-material" class="text-3xl font-bold text-slate-900">Cargando Historial...</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8" id="stats-material">
            </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-900 text-white text-[10px] uppercase font-bold tracking-widest">
                    <tr>
                        <th class="px-8 py-4">Fecha</th>
                        <th class="px-8 py-4">Tipo</th>
                        <th class="px-8 py-4">Cantidad / Vol.</th>
                        <th class="px-8 py-4">Lote / Frasco</th>
                        <th class="px-8 py-4">Motivo / Observación</th>
                    </tr>
                </thead>
                <tbody id="tabla-movimientos" class="divide-y divide-slate-100 text-sm">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "https://inventario-api-85mp.onrender.com";
        const urlParams = new URLSearchParams(window.location.search);
        const materialId = urlParams.get('id');

        async function cargarHistorialEspecifico() {
            if (!materialId) return;
            try {
                const res = await fetch(`${API_URL}/material/${materialId}/movimientos`);
                const data = await res.json();
                
                document.getElementById('nombre-material').innerText = data.nombre;
                const tabla = document.getElementById('tabla-movimientos');
                
                tabla.innerHTML = data.movimientos.map(m => `
                    <tr>
                        <td class="px-8 py-4 text-slate-500">${new Date(m.fecha).toLocaleString()}</td>
                        <td class="px-8 py-4">
                            <span class="${m.tipo === 'entrada' ? 'text-emerald-600 bg-emerald-50' : 'text-red-600 bg-red-50'} px-2 py-1 rounded-md font-bold text-xs uppercase">
                                ${m.tipo}
                            </span>
                        </td>
                        <td class="px-8 py-4 font-bold">${m.cantidad} ${m.es_reactivo ? 'mL' : 'uds'}</td>
                        <td class="px-8 py-4 font-mono text-xs">${m.lote || 'N/A'}</td>
                        <td class="px-8 py-4 text-slate-600 italic">${m.observacion}</td>
                    </tr>
                `).join('');
                lucide.createIcons();
            } catch (e) { console.error(e); }
        }
        window.onload = cargarHistorialEspecifico;
    </script>
</body>
</html>
